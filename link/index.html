    async function encrypt(text, password) {
      const enc = new TextEncoder();

      // 1. derive key
      const keyMaterial = await crypto.subtle.digest(
        "SHA-256",
        enc.encode(password)
      );

      const key = await crypto.subtle.importKey(
        "raw",
        keyMaterial,
        { name: "AES-GCM" },
        false,
        ["encrypt"]
      );

      // 2. random IV
      const iv = crypto.getRandomValues(new Uint8Array(12));

      // 3. encrypt
      const ciphertextBuffer = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv },
        key,
        enc.encode(text)
      );

      // ✅ convert to normal arrays
      return {
        iv: Array.from(iv),
        ciphertext: Array.from(new Uint8Array(ciphertextBuffer)),
      };
    }

    async function decrypt(ciphertextArray, ivArray, password) {
      const enc = new TextEncoder();
      const dec = new TextDecoder();

      // 1. derive key
      const keyMaterial = await crypto.subtle.digest(
        "SHA-256",
        enc.encode(password)
      );

      const key = await crypto.subtle.importKey(
        "raw",
        keyMaterial,
        { name: "AES-GCM" },
        false,
        ["decrypt"]
      );

      // ✅ convert arrays back to typed arrays
      const iv = new Uint8Array(ivArray);
      const ciphertext = new Uint8Array(ciphertextArray);

      const plaintextBuffer = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv },
        key,
        ciphertext
      );

      return dec.decode(plaintextBuffer);
    }

    async function lookup(g) {
      let url = null;
      for (let i = 0; i < urls.length; i++) {
        const el = urls[i];
        const test = el.encryptedTestKey;
        try {
          if (await decrypt(test.ciphertext, test.iv, g)) {
            return el;
          }
        } catch (e) {}
      }

      return null;
    }

    async function redirect() {
      const params = new URLSearchParams(window.location.search);
      const g = params.get("g");

      console.log(`Looking up link for ${g}`);

      const el = await lookup(g);

      if (el) {
        url = await decrypt(el.url.ciphertext, el.url.iv, g);
        document.location.href = url;
        return true;
      }

      console.log("nothing found");
      return false;
    }

    async function newUrl() {
      const params = new URLSearchParams(window.location.search);
      const url = params.get("url");

      if (url === null) return false;
      const key = params.get("key");

      const entry = await createOne(url, key);
      console.log({ entry });

      showNewUrl(entry);

      return true;
    }

    async function doit() {
      if (await newUrl()) return;

      if (await redirect()) return;

      showCreateForm();
    }

    function showCreateForm() {
      document.body.classList.add("show-create-form");
      const params = new URLSearchParams(window.location.search);
      const key = params.get("key");
      document.getElementById("key-input").value = key || "";
    }

    function createRandomKey(size) {
      const chars =
        "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      let result = "";
      for (let i = 0; i < size; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    async function findNewKey() {
      for (let i = 0; i < 100; i++) {
        let key = createRandomKey(20);
        if ((await lookup(key)) === null) {
          return key;
        }
        if (i === 99) {
          alert("Could not find a new unique key after 100 tries.");
          return null;
        }
      }

      return null;
    }

    async function createOne(url, key) {
      let existing;
      if (!key) {
        key = findNewKey();
      } else {
        if (key.includes("%")) {
          let token = await findNewKey();
          key = key.replace("%", token);
        }
        existing = await lookup(key);
      }
      const entry = {
        encryptedTestKey: await encrypt(testKey, key),
        url: await encrypt(url, key),
      };

      const linkUrl =
        document.location.origin + document.location.pathname + "?g=" + key;

      return { key, entry, linkUrl, existing, url };
    }

    function showNewUrl(entry) {
      const anchor = document.getElementById("result-anchor");
      const link = document.getElementById("result-link");
      const urlAnchor = document.getElementById("result-url-anchor");
      const url = document.getElementById("result-url");
      const json = document.getElementById("result-json");
      const jsonExisting = document.getElementById("result-json-existing");
      const key = document.getElementById("result-key");

      anchor.setAttribute("href", entry.linkUrl);
      anchor.innerText = entry.linkUrl;
      urlAnchor.setAttribute("href", entry.url);
      urlAnchor.innerText = entry.url;
      link.value = entry.linkUrl;
      url.value = entry.url;
      json.value = JSON.stringify(entry.entry, null, "    ");
      jsonExisting.value = JSON.stringify(entry.existing, null, "    ");
      key.value = entry.key;

      document.body.classList.add("show-result-table");

      if (entry.existing) {
        document.body.classList.add("show-result-table-with-existing");
      }
    }
