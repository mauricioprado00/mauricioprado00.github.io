    async function encrypt(text, password) {
      const enc = new TextEncoder();

      // 1. derive key
      const keyMaterial = await crypto.subtle.digest(
        "SHA-256",
        enc.encode(password)
      );

      const key = await crypto.subtle.importKey(
        "raw",
        keyMaterial,
        { name: "AES-GCM" },
        false,
        ["encrypt"]
      );

      // 2. random IV
      const iv = crypto.getRandomValues(new Uint8Array(12));

      // 3. encrypt
      const ciphertextBuffer = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv },
        key,
        enc.encode(text)
      );

      // ✅ convert to normal arrays
      return {
        iv: Array.from(iv),
        ciphertext: Array.from(new Uint8Array(ciphertextBuffer)),
      };
    }

    async function decrypt(ciphertextArray, ivArray, password) {
      const enc = new TextEncoder();
      const dec = new TextDecoder();

      // 1. derive key
      const keyMaterial = await crypto.subtle.digest(
        "SHA-256",
        enc.encode(password)
      );

      const key = await crypto.subtle.importKey(
        "raw",
        keyMaterial,
        { name: "AES-GCM" },
        false,
        ["decrypt"]
      );

      // ✅ convert arrays back to typed arrays
      const iv = new Uint8Array(ivArray);
      const ciphertext = new Uint8Array(ciphertextArray);

      const plaintextBuffer = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv },
        key,
        ciphertext
      );

      return dec.decode(plaintextBuffer);
    }

    async function lookup(g) {
      let url = null;
      for (let i = 0; i < urls.length; i++) {
        const el = urls[i];
        const test = el.encryptedTestKey;
        try {
          if (await decrypt(test.ciphertext, test.iv, g)) {
            return el;
          }
        } catch (e) {}
      }

      return null;
    }

    async function redirect() {

      }

    }

    function createRandomKey(size) {
      const chars =
        "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      let result = "";
      for (let i = 0; i < size; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    async function createOne(url) {
      let key;
      for (let i = 0; i < 100; i++) {
        key = createRandomKey(20);
        if ((await lookup(key)) === null) {
          break;

        if (i === 99) {

        url: await encrypt(url, key),
      };

      const linkUrl =
        document.location.origin + document.location.pathname + "?g=" + key;

      return { key, entry, linkUrl };
    }

      key.value = entry.key;
